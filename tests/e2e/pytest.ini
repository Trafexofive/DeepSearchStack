# DeepSearchStack - E2E Test Configuration
# For use with pytest

[tool:pytest]
addopts = -v --tb=short
testpaths = tests/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers = 
    e2e: end-to-end tests
    integration: integration tests
    slow: slow running tests
    api: API specific tests

[run]
source = .
omit = 
    */venv/*
    */env/*
    */tests/*
    */__pycache__/*