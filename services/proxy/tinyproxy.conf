User nobody
Group nogroup
Port 8888
Listen 0.0.0.0
Timeout 30


# Allow connections from Docker networks
Allow 127.0.0.1
Allow 172.0.0.0/8
Allow 10.0.0.0/8
Allow 192.168.0.0/16

# Upstream proxy (uncomment to chain through VPN/WireGuard)
# Upstream http 10.0.0.1:8080

# Disable Via header (don't advertise proxy)
DisableViaHeader Yes

# Performance
MaxClients 100
MinSpareServers 5
MaxSpareServers 20
StartServers 10
MaxRequestsPerChild 0

# Logging
LogLevel Info
LogFile "/var/log/tinyproxy/tinyproxy.log"
PidFile "/var/run/tinyproxy/tinyproxy.pid"

# Anonymous (strip identifying headers)
Anonymous "Cookie"
Anonymous "Authorization"
