User nobody
Group nogroup
Port 8888
Listen 0.0.0.0
Timeout 30

# Allow all Docker networks
Allow 127.0.0.1
Allow 172.0.0.0/8
Allow 10.0.0.0/8
Allow 192.168.0.0/16

# Upstream proxy (uncomment to chain through VPN/WireGuard)
# Upstream http 10.0.0.1:8080

# Strip identifying headers
DisableViaHeader Yes
Anonymous "Cookie"
Anonymous "Authorization"

# Logging to stdout (Docker captures it)
LogLevel Info
# Log to stderr by default in Docker
# LogFile "/dev/stdout"
PidFile "/var/run/tinyproxy/tinyproxy.pid"

# Threading (keep it simple)
MaxClients 100
MinSpareServers 5
MaxSpareServers 20
StartServers 10
MaxRequestsPerChild 0
