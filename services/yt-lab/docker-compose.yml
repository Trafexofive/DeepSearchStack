# yt-lab stack — YouTube automation
# yt-extractor: host networking (YouTube blocks datacenter IPs)
# yt-lab: substrate-net (orchestration only)
services:
  yt-extractor:
    build: ./services/yt-extractor
    network_mode: host
    environment:
      - YT_EXTRACTOR_PORT=8020
    volumes:
      - ./services/yt-extractor/config:/app/config:ro
    restart: unless-stopped

  yt-lab:
    build: ./services/yt-lab
    network_mode: host
    environment:
      - YT_LAB_PORT=8021
      - EXTRACTOR_URL=${EXTRACTOR_URL:-http://localhost:8020}
      - WAREHOUSE_URL=${WAREHOUSE_URL:-http://localhost:8009}
      - INFERENCE_URL=${INFERENCE_URL:-http://localhost:8005/v1/chat/completions}
      - HUMANIZER_URL=${HUMANIZER_URL:-http://localhost:8013}
      - YT_LAB_DATA=/app/data
    depends_on:
      - yt-extractor
    volumes:
      - ./volumes/data:/app/data
