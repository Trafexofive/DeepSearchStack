services:
  knowledge-bridge:
    build: .
    ports:
      - "${BRIDGE_PORT:-8010}:8010"
    environment:
      - BRIDGE_PORT=8010
      - DEEPSEARCH_URL=${DEEPSEARCH_URL:-http://dss-deepsearch:8001}
      - WEB_API_URL=${WEB_API_URL:-http://dss-web-api:8014}
      - WAREHOUSE_URL=${WAREHOUSE_URL:-http://knowledge-warehouse:8009}
      - CRAWLER_URL=${CRAWLER_URL:-http://dss-crawler:8000}
      - BLOG_GENERATOR_URL=${BLOG_GENERATOR_URL:-http://blog_generator:8006}
    networks:
      - bridge-net

networks:
  bridge-net:
    external: true
    name: infra_substrate-net
