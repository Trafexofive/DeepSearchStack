# Ingest service — RSS feeds to watch
# Each feed gets auto-generated into researched blog posts
feeds:
  # AI / ML research
  - url: "https://arxiv.org/rss/cs.AI"
    category: "research"
    tags: ["ai", "research", "arxiv"]
    enabled: true
    interval_minutes: 60

  - url: "https://arxiv.org/rss/cs.CL"
    category: "research"
    tags: ["nlp", "language-models", "arxiv"]
    enabled: true
    interval_minutes: 60

  - url: "https://arxiv.org/rss/cs.LG"
    category: "research"
    tags: ["machine-learning", "deep-learning", "arxiv"]
    enabled: true
    interval_minutes: 60

  # AI news
  - url: "https://hnrss.org/frontpage?q=ai+OR+llm+OR+gpt+OR+deepseek+OR+openai+OR+reasoning"
    category: "news"
    tags: ["hackernews", "ai", "discussion"]
    enabled: false  # Hacker News — noisy, enable manually

  # Open-source AI
  - url: "https://github.blog/feed/"
    category: "news"
    tags: ["github", "open-source", "devtools"]
    enabled: false  # Broad feed — enable for general coverage

  # More feeds can be added here. Format:
  # - url: "https://example.com/feed.xml"
  #   category: "news" | "guide" | "benchmark" | "research" | "opinion"
  #   tags: ["tag1", "tag2"]
  #   enabled: true | false
  #   interval_minutes: 60  # How often to poll

# Generation settings
generation:
  style: "technical"
  model: "deepseek-v4-flash"
  max_tokens: 2048
  temperature: 0.7
  auto_publish: false  # Require human review before publishing
  min_content_length: 500  # Skip entries with less content
