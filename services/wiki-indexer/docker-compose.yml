services:
  wiki-indexer:
    build: .
    ports:
      - "${WIKI_INDEXER_PORT:-8014}:8014"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - WIKI_DUMP_PATH=/app/data/enwiki-latest-pages-articles.xml.bz2
      - WIKI_DUMP_URL=https://dumps.wikimedia.org/enwiki/latest/enwiki-latest-pages-articles.xml.bz2
      - WAREHOUSE_URL=http://knowledge-warehouse:8009
      - VECTOR_STORE_URL=http://dss-vector-store:8003
    networks:
      - deepsearch_net
    restart: "no"

networks:
  deepsearch_net:
    external: true
