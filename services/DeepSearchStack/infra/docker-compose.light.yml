# DeepSearchStack — Light Compose (just deepsearch + data services, no search backends)
# LLM routing via substrate inference-gateway

volumes:
  postgres_data:
  redis_data:
  vector_data:

networks:
  deepsearch_net:
    driver: bridge
    name: deepsearch_net
  infra_substrate-net:
    external: true

services:
  postgres:
    image: postgres:15-alpine
    container_name: dss-light-postgres
    restart: unless-stopped
    networks: [deepsearch_net]
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-searchdb}
      - POSTGRES_USER=${POSTGRES_USER:-searchuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-searchpass}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: dss-light-redis
    restart: unless-stopped
    networks: [deepsearch_net]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  deepsearch:
    build:
      context: ..
      dockerfile: services/deepsearch/Dockerfile
    container_name: dss-light-deepsearch
    restart: unless-stopped
    networks: [deepsearch_net, infra_substrate-net]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    environment:
      - SEARCH_GATEWAY_URL=http://search-gateway:8002
      - INFERENCE_GATEWAY_URL=http://inference_gateway:8005
      - VECTOR_STORE_URL=http://vector-store:8004
      - CRAWLER_URL=http://crawler:8000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql://searchuser:searchpass@postgres:5432/searchdb
    ports:
      - "8001:8001"

  vector-store:
    build:
      context: ..
      dockerfile: services/vector-store/Dockerfile
    container_name: dss-light-vector-store
    restart: unless-stopped
    networks: [deepsearch_net]
    volumes: [vector_data:/app/data]
    ports:
      - "8004:8004"

  crawler:
    build:
      context: ..
      dockerfile: services/crawler/Dockerfile
    container_name: dss-light-crawler
    restart: unless-stopped
    networks: [deepsearch_net]
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
