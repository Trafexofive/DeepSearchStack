# DeepSearchStack — Test Compose (non-conflicting ports for local dev)
# LLM routing via substrate inference-gateway

volumes:
  postgres_data:
  yacy_data:
  redis_data:
  vector_data:

networks:
  deepsearch_net:
    driver: bridge
    name: deepsearch_net
  substrate-net:
    external: true

services:
  postgres:
    image: postgres:15-alpine
    container_name: dss-test-postgres
    restart: unless-stopped
    networks: [deepsearch_net]
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-searchdb}
      - POSTGRES_USER=${POSTGRES_USER:-searchuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-searchpass}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: dss-test-redis
    restart: unless-stopped
    networks: [deepsearch_net]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  search-gateway:
    build:
      context: ..
      dockerfile: services/search-gateway/Dockerfile
    container_name: dss-test-search-gateway
    restart: unless-stopped
    networks: [deepsearch_net]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - YACY_URL=http://yacy:8090
      - WHOOGLE_URL=http://whoogle:5000
      - SEARXNG_URL=http://searxng:8080
    ports:
      - "8012:8002"

  deepsearch:
    build:
      context: ..
      dockerfile: services/deepsearch/Dockerfile
    container_name: dss-test-deepsearch
    restart: unless-stopped
    networks: [deepsearch_net, substrate-net]
    depends_on:
      search-gateway: {condition: service_started}
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    environment:
      - SEARCH_GATEWAY_URL=http://search-gateway:8002
      - INFERENCE_GATEWAY_URL=http://inference_gateway:8005
      - VECTOR_STORE_URL=http://vector-store:8004
      - CRAWLER_URL=http://crawler:8000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql://searchuser:searchpass@postgres:5432/searchdb
    ports:
      - "8011:8001"

  yacy:
    image: yacy/yacy_search_server:latest
    container_name: dss-test-yacy
    restart: unless-stopped
    networks: [deepsearch_net]
    volumes: [yacy_data:/opt/yacy_search_server/DATA]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/status.json"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  whoogle:
    image: benbusby/whoogle-search:latest
    container_name: dss-test-whoogle
    restart: unless-stopped
    networks: [deepsearch_net]
    environment:
      - WHOOGLE_CONFIG_GET_ONLY=1

  searxng:
    image: searxng/searxng:latest
    container_name: dss-test-searxng
    restart: unless-stopped
    networks: [deepsearch_net]
    volumes:
      - ../services/searxng/settings.yml:/etc/searxng/settings.yml
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, DAC_OVERRIDE]

  vector-store:
    build:
      context: ..
      dockerfile: services/vector-store/Dockerfile
    container_name: dss-test-vector-store
    restart: unless-stopped
    networks: [deepsearch_net]
    volumes: [vector_data:/app/data]
    ports:
      - "8014:8004"

  crawler:
    build:
      context: ..
      dockerfile: services/crawler/Dockerfile
    container_name: dss-test-crawler
    restart: unless-stopped
    networks: [deepsearch_net]
    ports:
      - "8010:8000"
    environment:
      - PORT=8000
