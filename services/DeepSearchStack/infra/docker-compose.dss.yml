# ======================================================================================
# DeepSearchStack — Streamlined Docker Compose
# LLM routing via substrate inference-gateway (port 8005, on infra_substrate-net)
# ======================================================================================

volumes:
  postgres_data:
  yacy_data:
  redis_data:
  vector_data:
  warehouse_data:

networks:
  deepsearch_net:
    driver: bridge
    name: deepsearch_net
  infra_substrate-net:
    external: true

services:
  # --- CORE INFRASTRUCTURE ---
  postgres:
    image: postgres:15-alpine
    container_name: dss-postgres
    restart: unless-stopped
    networks:
      - deepsearch_net
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-searchdb}
      - POSTGRES_USER=${POSTGRES_USER:-searchuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-searchpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: dss-redis
    restart: unless-stopped
    networks:
      - deepsearch_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- CORE LOGIC ---
  search-gateway:
    build:
      context: ..
      dockerfile: services/search-gateway/Dockerfile
    container_name: dss-search-gateway
    restart: unless-stopped
    networks:
      - deepsearch_net
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - YACY_URL=http://yacy:8090
      - WHOOGLE_URL=http://whoogle:5000
      - SEARXNG_URL=http://searxng:8080
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8002:8002"

  deepsearch:
    build:
      context: ..
      dockerfile: services/deepsearch/Dockerfile
    container_name: dss-deepsearch
    restart: unless-stopped
    networks:
      - deepsearch_net
      - infra_substrate-net
    depends_on:
      search-gateway:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SEARCH_GATEWAY_URL=http://search-gateway:8002
      - INFERENCE_GATEWAY_URL=http://inference_gateway:8005
      - VECTOR_STORE_URL=http://vector-store:8004
      - CRAWLER_URL=http://crawler:8000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql://searchuser:searchpass@postgres:5432/searchdb
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- SEARCH BACKENDS ---
  yacy:
    image: yacy/yacy_search_server:latest
    container_name: dss-yacy
    restart: unless-stopped
    networks:
      - deepsearch_net
    volumes:
      - yacy_data:/opt/yacy_search_server/DATA
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/yacysearch.json?query=test&maximumRecords=1"]
      interval: 30s
      timeout: 15s
      retries: 30
      start_period: 180s

  whoogle:
    image: benbusby/whoogle-search:latest
    container_name: dss-whoogle
    restart: unless-stopped
    networks:
      - deepsearch_net
    environment:
      - WHOOGLE_CONFIG_GET_ONLY=1

  searxng:
    image: searxng/searxng:latest
    container_name: dss-searxng
    restart: unless-stopped
    networks:
      - deepsearch_net
    volumes:
      - ../services/searxng/settings.yml:/etc/searxng/settings.yml
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, DAC_OVERRIDE]

  # --- DATA SERVICES ---
  vector-store:
    build:
      context: ..
      dockerfile: services/vector-store/Dockerfile
    container_name: dss-vector-store
    restart: unless-stopped
    networks:
      - deepsearch_net
    volumes:
      - vector_data:/app/data
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  crawler:
    build:
      context: ..
      dockerfile: services/crawler/Dockerfile
    container_name: dss-crawler
    restart: unless-stopped
    networks:
      - deepsearch_net
      - infra_substrate-net
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - KNOWLEDGE_WAREHOUSE_URL=http://knowledge-warehouse:8009
      - FORWARD_TO_WAREHOUSE=true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  knowledge-warehouse:
    build:
      context: ..
      dockerfile: services/knowledge-warehouse/Dockerfile
    container_name: dss-knowledge-warehouse
    restart: unless-stopped
    networks:
      - deepsearch_net
      - infra_substrate-net
    ports:
      - "8009:8009"
    environment:
      - PORT=8009
    volumes:
      - warehouse_data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8009/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- AI SERVICES ---
  search-agent:
    build:
      context: ..
      dockerfile: services/search-agent/Dockerfile
    container_name: dss-search-agent
    restart: unless-stopped
    networks:
      - deepsearch_net
      - infra_substrate-net
    depends_on:
      search-gateway:
        condition: service_started
    environment:
      - LLM_GATEWAY_URL=http://inference_gateway:8005
    ports:
      - "8013:8013"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8013/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-api:
    build:
      context: ..
      dockerfile: services/web-api/Dockerfile
    container_name: dss-web-api
    restart: unless-stopped
    networks:
      - deepsearch_net
      - infra_substrate-net
    depends_on:
      search-gateway:
        condition: service_started
      search-agent:
        condition: service_healthy
    environment:
      - SEARCH_AGENT_URL=http://search-agent:8013
      - INFERENCE_GATEWAY_URL=http://inference_gateway:8005
      - SEARCH_GATEWAY_URL=http://search-gateway:8002
      - WAREHOUSE_URL=http://knowledge-warehouse:8009
      - CRAWLER_URL=http://crawler:8000
      - VECTOR_STORE_URL=http://vector-store:8004
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8014:8014"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8014/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
