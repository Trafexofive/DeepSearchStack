# ===================================================================
# SearXNG — Maximum Bloated Configuration for DeepSearchStack
# All engines enabled, all formats, no rate limits
# ===================================================================

use_default_settings: true

server:
  secret_key: "a8a3e9a3b1d1c4b7f8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3"
  limiter: false
  image_proxy: true
  port: 8080
  bind_address: "0.0.0.0"
  public_instance: false

ui:
  static_use_hash: false

search:
  formats:
    - html
    - json
    - csv
    - rss
  safe_search: 0
  autocomplete: "google"
  default_lang: ""
  languages:
    - all
  ban_time_on_fail: 0
  max_ban_time_on_fail: 0

