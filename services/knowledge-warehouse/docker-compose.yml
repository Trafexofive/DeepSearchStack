services:
  knowledge-warehouse:
    build: .
    ports:
      - "${KW_PORT:-8009}:8009"
    volumes:
      - ./config:/app/config:ro
      - ./volumes/data:/app/volumes/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://searchuser:searchpass@dss-postgres:5432/searchdb
      - KW_NAMESPACE=default
    networks:
      - deepsearch_net
    restart: unless-stopped

networks:
  deepsearch_net:
    external: true
