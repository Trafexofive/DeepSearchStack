services:
  humanizer:
    build: .
    ports:
      - "${HUMANIZER_PORT:-8013}:8013"
    environment:
      - HUMANIZER_PORT=8013
      - INFERENCE_URL=${INFERENCE_URL:-http://inference_gateway:8005/v1/chat/completions}
      - HUMANIZER_MODEL=${HUMANIZER_MODEL:-nvidia_nim:zhipuai/glm-4-9b-chat}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./config:/app/config:ro
    networks:
      - humanizer-net

networks:
  humanizer-net:
    driver: bridge
