# trend-test — Focused compose for viral trend analysis testing
# Boot: docker compose -f infra/docker-compose.trend-test.yml up -d
# Requires: existing images for knowledge-warehouse, inference_gateway, yt-lab

services:
  # ─── Dependencies ──────────────────────────────────────────

  knowledge-warehouse:
    image: substrate-dss-knowledge-warehouse:latest
    container_name: trend-test-warehouse
    ports:
      - "8009:8009"               # host-mapped so yt-lab (host net) can reach it
    environment:
      - PORT=8009
    volumes:
      - warehouse-test-data:/app/data
    networks:
      - trend-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8009/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  inference_gateway:
    image: substrate-core-inference_gateway:latest
    container_name: trend-test-inference
    ports:
      - "8005:8005"
    environment:
      - INFERENCE_GATEWAY_PORT=8005
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - LOG_LEVEL=INFO
    networks:
      - trend-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Trend Stack ───────────────────────────────────────────

  yt-lab:
    build: ../services/yt-lab
    container_name: trend-test-yt-lab
    network_mode: host
    environment:
      - YT_LAB_PORT=8020
      - WAREHOUSE_URL=http://localhost:8009
      - WEB_API_URL=http://localhost:8014
      - INFERENCE_URL=http://localhost:8005/v1/chat/completions
      - YT_LAB_DATA=/app/data
    volumes:
      - ../services/yt-lab/volumes/data:/app/data
    depends_on:
      knowledge-warehouse:
        condition: service_healthy
      inference_gateway:
        condition: service_healthy
    restart: unless-stopped

  trend-engine:
    build: ../services/trend-engine
    container_name: trend-test-engine
    network_mode: host
    environment:
      - TREND_ENGINE_PORT=8021
      - WAREHOUSE_URL=http://localhost:8009
      - YT_LAB_URL=http://localhost:8020
      - INFERENCE_URL=http://localhost:8005/v1/chat/completions
      - TREND_DATA=/app/data
    volumes:
      - ../services/trend-engine/volumes/data:/app/data
    restart: unless-stopped

networks:
  trend-net:
    driver: bridge

volumes:
  warehouse-test-data:
