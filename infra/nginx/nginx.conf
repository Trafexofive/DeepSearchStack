events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    resolver 127.0.0.11 valid=5s;

    server {
        listen 80;

        set $api_gateway_upstream http://api_gateway:8000;

        # ── Inference Gateway ────────────────────────────────────
        location /inference/ {
            proxy_pass http://inference_gateway:8005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            client_max_body_size 10m;
        }

        # ── Trend Engine ─────────────────────────────────────────
        location /trends/ {
            proxy_pass http://trend-engine:8021/trends/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
        }

        # ── Trends Aggregator ───────────────────────────────────
        location /agg/ {
            proxy_pass http://trends-aggregator:8022/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 180s;
        }

        # ── YT-Lab ───────────────────────────────────────────────
        location /yt-lab/ {
            proxy_pass http://localhost:8020/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
        }

        # ── Healthcheck ──────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","proxy":"core-nginx"}';
            add_header Content-Type application/json;
        }

        location / {
            proxy_pass $api_gateway_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
        }
    }
}
