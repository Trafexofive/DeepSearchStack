events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;

        # ── Inference Gateway ────────────────────────────────────
        location /inference/ {
            set $upstream inference_gateway:8005;
            rewrite ^/inference(/.*)$ $1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 10m;
        }

        # ── Trend Engine ─────────────────────────────────────────
        location /trends/ {
            set $upstream trend-engine:8021;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Trends Aggregator ───────────────────────────────────
        location /agg/ {
            set $upstream trends-aggregator:8022;
            rewrite ^/agg(/.*)$ $1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
        }

        # ── Blog Generator ───────────────────────────────────────
        location /blog/ {
            set $upstream blog_generator:8006;
            rewrite ^/blog(/.*)$ $1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── Humanizer ────────────────────────────────────────────
        location /humanizer/ {
            set $upstream humanizer:8013;
            rewrite ^/humanizer(/.*)$ $1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Healthcheck ──────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","proxy":"core-nginx"}';
            add_header Content-Type application/json;
        }

        location / {
            set $upstream api_gateway:8000;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
        }
    }
}
