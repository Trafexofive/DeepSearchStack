# Substrate Core — Motherboard Docker Compose
# Boots all runtime services and their dependencies.

services:
  # ─── Core Services ──────────────────────────────────────────────────────────

  api_gateway:
    build: ../services/api_gateway
    environment:
      - API_GATEWAY_PORT=8000
      - REDIS_URL=redis://event_bus:6379/0
    depends_on:
      event_bus:
        condition: service_started
    volumes:
      - ../services/api_gateway/config:/app/config:ro
      - ../services/api_gateway/volumes/data:/app/data
    networks:
      - substrate-net
      - bridge-net

  workflow_engine:
    build: ../services/workflow_engine
    environment:
      - WORKFLOW_ENGINE_PORT=8001
      - REDIS_URL=redis://event_bus:6379/0
    depends_on:
      - event_bus
    volumes:
      - ../manifests/workflows:/app/manifests/workflows:ro
      - ../services/workflow_engine/config:/app/config:ro
    networks:
      - substrate-net

  llm_gateway:
    build: ../services/llm_gateway
    environment:
      - LLM_GATEWAY_PORT=8002
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-llama3.2:latest}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ../services/llm_gateway/config:/app/config:ro
    networks:
      - substrate-net

  inference_gateway:
    build: ../services/inference-gateway
    ports:
      - "${INFERENCE_PORT:-8005}:8005"
    environment:
      - INFERENCE_GATEWAY_PORT=8005
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ../services/inference-gateway/config:/app/config:ro
    networks:
      - substrate-net
      - bridge-net

  blog_generator:
    build: ../services/blog_generator
    ports:
      - "${BLOG_GEN_PORT:-8006}:8006"
    environment:
      - BLOG_GENERATOR_PORT=8006
      - WAREHOUSE_URL=http://knowledge_warehouse:8009
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TRACKER_DB=/app/data/tracker.db
    depends_on:
      - inference_gateway
    volumes:
      - ../services/blog_generator/volumes/data:/app/data
    networks:
      - substrate-net
      - bridge-net

  event_bus:
    build: ../services/event_bus
    environment:
      - EVENT_BUS_PORT=8003
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ../services/event_bus/config:/app/config:ro
    networks:
      - substrate-net

  knowledge_bridge:
    build: ../services/knowledge-bridge
    environment:
      - BRIDGE_PORT=8010
      - DEEPSEARCH_URL=http://dss-deepsearch:8001
      - WEB_API_URL=http://dss-web-api:8014
      - WAREHOUSE_URL=http://knowledge-warehouse:8009
      - CRAWLER_URL=http://dss-crawler:8000
      - BLOG_GENERATOR_URL=http://blog_generator:8006
    networks:
      - substrate-net
      - bridge-net

  knowledge_warehouse:
    build: ../services/knowledge-warehouse
    ports:
      - "${WAREHOUSE_PORT:-8009}:8009"
    environment:
      - WAREHOUSE_PORT=8009
      - WAREHOUSE_DATA=/app/data
    volumes:
      - ../services/knowledge-warehouse/volumes/data:/app/data
      - ../services/knowledge-warehouse/config:/app/config:ro
    networks:
      - substrate-net

  geo_audit:
    build: ../services/geo-audit
    environment:
      - GEO_AUDIT_PORT=8011
      - CRAWLER_URL=http://dss-crawler:8000
    networks:
      - substrate-net
      - bridge-net

  trend-engine:
    build: ../services/trend-engine
    network_mode: host
    environment:
      - TREND_ENGINE_PORT=8021
      - WAREHOUSE_URL=http://localhost:8009
      - YT_LAB_URL=http://localhost:8020
      - INFERENCE_URL=http://localhost:8005/v1/chat/completions
      - TREND_DATA=/app/data
    volumes:
      - ../services/trend-engine/volumes/data:/app/data
    restart: unless-stopped

  trends-aggregator:
    build: ../services/trends-aggregator
    ports:
      - "${TRENDS_AGG_PORT:-8022}:8022"
    environment:
      - TRENDS_AGG_PORT=8022
      - SEARXNG_URL=http://searxng:8080
      - CRAWLER_URL=http://crawler:8000
      - YT_LAB_URL=http://localhost:8020
      - TREND_ENGINE_URL=http://localhost:8021
      - WAREHOUSE_URL=http://knowledge-warehouse:8009
      - INFERENCE_URL=http://inference_gateway:8005/v1/chat/completions
      - TRENDS_AGG_DATA=/app/data
    volumes:
      - ../services/trends-aggregator/volumes/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - substrate-net
      - bridge-net
    restart: unless-stopped

  sub_mq:
    build: ../services/sub-mq
    environment:
      - SUB_MQ_PORT=8012
      - REDIS_URL=redis://redis:6379/0
    networks:
      - substrate-net
      - bridge-net

  ingest:
    build: ../services/ingest
    environment:
      - INGEST_PORT=8008
      - INGEST_CONFIG=/app/config/feeds.yml
      - INGEST_OUTPUT_DIR=/app/output
      - CRAWLER_URL=http://dss-crawler:8000
      - BLOG_GENERATOR_URL=http://blog_generator:8006
    volumes:
      - ../services/ingest/config:/app/config:ro
      - ../services/ingest/volumes/data:/app/volumes/data
      - ../services/ingest/volumes/data:/app/volumes/data
    networks:
      - substrate-net
      - bridge-net


  # yt-lab — decoupled into services/yt-lab/ stack (docker-compose.yml there)
  # yt-extractor: host-net :8020 (yt-dlp)
  # yt-lab: substrate-net :8021 (orchestration)
  # Boot with: make up yt-lab



  humanizer:
    build: ../services/humanizer
    ports:
      - "${HUMANIZER_PORT:-8013}:8013"
    environment:
      - HUMANIZER_PORT=8013
      - INFERENCE_URL=http://inference_gateway:8005/v1/chat/completions
      - HUMANIZER_MODEL=${HUMANIZER_MODEL:-nvidia_nim:zhipuai/glm-4-9b-chat}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - inference_gateway
    volumes:
      - ../services/humanizer/config:/app/config:ro
    networks:
      - substrate-net
      - bridge-net

  proxy-rotator:
    build: ../services/proxy-rotator
    environment:
      - POOL_FILE=/app/data/proxy-pool.json
    volumes:
      - ../services/proxy-rotator/volumes/data:/app/volumes/data
      - ../services/proxy-rotator/volumes/tor-data:/tmp/tor
    networks:
      - bridge-net
    restart: unless-stopped


  # ─── Infrastructure ────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    volumes:
      - ../services/event_bus/volumes/redis-data:/data
    networks:
      - substrate-net

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api_gateway:
        condition: service_started
      inference_gateway:
        condition: service_started
      trend-engine:
        condition: service_started
      trends-aggregator:
        condition: service_started
      blog_generator:
        condition: service_started
      humanizer:
        condition: service_started
    restart: unless-stopped
    networks:
      - substrate-net

networks:
  substrate-net:
    driver: bridge
  bridge-net:
    external: true
    name: infra_substrate-net
