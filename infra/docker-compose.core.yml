# Substrate Core — Motherboard Docker Compose
# Boots all runtime services and their dependencies.

services:
  # ─── Core Services ──────────────────────────────────────────────────────────

  api_gateway:
    build: ../services/api_gateway
    environment:
      - API_GATEWAY_PORT=8000
      - REDIS_URL=redis://event_bus:6379/0
    depends_on:
      event_bus:
        condition: service_started
    volumes:
      - ../services/api_gateway/config:/app/config:ro
      - ../services/api_gateway/volumes/data:/app/data
    networks:
      - substrate-net
      - bridge-net

  workflow_engine:
    build: ../services/workflow_engine
    environment:
      - WORKFLOW_ENGINE_PORT=8001
      - REDIS_URL=redis://event_bus:6379/0
    depends_on:
      - event_bus
    volumes:
      - ../manifests/workflows:/app/manifests/workflows:ro
      - ../services/workflow_engine/config:/app/config:ro
    networks:
      - substrate-net

  llm_gateway:
    build: ../services/llm_gateway
    environment:
      - LLM_GATEWAY_PORT=8002
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-llama3.2:latest}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ../services/llm_gateway/config:/app/config:ro
    networks:
      - substrate-net

  inference_gateway:
    build: ../services/inference-gateway
    ports:
      - "8005:8005"
    environment:
      - INFERENCE_GATEWAY_PORT=8005
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ../services/inference-gateway/config:/app/config:ro
    networks:
      - substrate-net
      - bridge-net

  blog_generator:
    build: ../services/blog_generator
    environment:
      - BLOG_GENERATOR_PORT=8006
      - WAREHOUSE_URL=http://dss-knowledge-warehouse:8009
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TRACKER_DB=/app/data/tracker.db
    depends_on:
      - inference_gateway
    volumes:
      - ../services/blog_generator/volumes/data:/app/data
    networks:
      - substrate-net
      - bridge-net

  event_bus:
    build: ../services/event_bus
    environment:
      - EVENT_BUS_PORT=8003
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ../services/event_bus/config:/app/config:ro
    networks:
      - substrate-net

  knowledge_bridge:
    build: ../services/knowledge-bridge
    environment:
      - BRIDGE_PORT=8010
      - DEEPSEARCH_URL=http://dss-deepsearch:8001
      - WEB_API_URL=http://dss-web-api:8014
      - WAREHOUSE_URL=http://dss-knowledge-warehouse:8009
      - CRAWLER_URL=http://dss-crawler:8000
      - BLOG_GENERATOR_URL=http://blog_generator:8006
    networks:
      - substrate-net
      - bridge-net

  geo_audit:
    build: ../services/geo-audit
    environment:
      - GEO_AUDIT_PORT=8011
      - CRAWLER_URL=http://dss-crawler:8000
    networks:
      - substrate-net
      - bridge-net

  sub_mq:
    build: ../services/sub-mq
    environment:
      - SUB_MQ_PORT=8012
      - REDIS_URL=redis://redis:6379/0
    networks:
      - substrate-net
      - bridge-net

  ingest:
    build: ../services/ingest
    environment:
      - INGEST_PORT=8008
      - INGEST_CONFIG=/app/config/feeds.yml
      - INGEST_OUTPUT_DIR=/app/output
      - CRAWLER_URL=http://dss-crawler:8000
      - BLOG_GENERATOR_URL=http://blog_generator:8006
    volumes:
      - ../services/ingest/config:/app/config:ro
      - ../services/ingest/output:/app/output
      - ../services/ingest/volumes/data:/app/volumes/data
    networks:
      - substrate-net
      - bridge-net


  yt-lab:
    build: ../services/yt-lab
    network_mode: host
    environment:
      - YT_LAB_PORT=8020
      - WAREHOUSE_URL=http://localhost:8009
      - WEB_API_URL=http://localhost:8014
      - INFERENCE_URL=http://localhost:8005/v1/chat/completions
      - YT_LAB_DATA=/app/data
    volumes:
      - ../services/yt-lab/volumes/data:/app/data



  proxy-rotator:
    build: ../services/proxy-rotator
    environment:
      - POOL_FILE=/app/data/proxy-pool.json
    volumes:
      - ../services/proxy-rotator/data:/app/data
    networks:
      - bridge-net
    restart: unless-stopped

  proxy:
    build: ../services/proxy
    networks:
      - bridge-net
      - substrate-net
    restart: unless-stopped

  # ─── Infrastructure ────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - substrate-net

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_gateway
    networks:
      - substrate-net

networks:
  substrate-net:
    driver: bridge
  bridge-net:
    external: true
    name: infra_substrate-net

volumes:
  redis-data:
