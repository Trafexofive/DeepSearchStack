# Substrate Core — Motherboard Docker Compose
# Boots all runtime services and their dependencies.

services:
  # ─── Core Services ──────────────────────────────────────────────────────────

  api_gateway:
    build: ../services/api_gateway
    ports:
      - "8000:8000"
    environment:
      - API_GATEWAY_PORT=8000
      - REDIS_URL=redis://event_bus:6379/0
    depends_on:
      event_bus:
        condition: service_started
    volumes:
      - ../services/api_gateway/config:/app/config:ro
      - ../services/api_gateway/volumes/data:/app/data
    networks:
      - substrate-net

  workflow_engine:
    build: ../services/workflow_engine
    ports:
      - "8001:8001"
    environment:
      - WORKFLOW_ENGINE_PORT=8001
      - REDIS_URL=redis://event_bus:6379/0
    depends_on:
      - event_bus
    volumes:
      - ../manifests/workflows:/app/manifests/workflows:ro
      - ../services/workflow_engine/config:/app/config:ro
    networks:
      - substrate-net

  llm_gateway:
    build: ../services/llm_gateway
    ports:
      - "8002:8002"
    environment:
      - LLM_GATEWAY_PORT=8002
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-llama3.2:latest}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ../services/llm_gateway/config:/app/config:ro
    networks:
      - substrate-net

  inference_gateway:
    build: ../services/inference-gateway
    ports:
      - "8005:8005"
    environment:
      - INFERENCE_GATEWAY_PORT=8005
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ../services/inference-gateway/config:/app/config:ro
    networks:
      - substrate-net

  deepsearch:
    build:
      context: ../services/DeepSearchStack
      dockerfile: services/deepsearch/Dockerfile
    ports:
      - "8007:8001"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - INFERENCE_GATEWAY_URL=http://inference_gateway:8005
      - SEARCH_GATEWAY_URL=http://search_gateway:8002
      - VECTOR_STORE_URL=http://vector_store:8004
      - CRAWLER_URL=http://crawler:8000
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-deepsearch}:${POSTGRES_PASSWORD:-deepsearch}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-deepsearch}
    depends_on:
      - inference_gateway
    networks:
      substrate-net:
      deepsearch_net:
        aliases:
          - deepsearch

  blog_generator:
    build: ../services/blog_generator
    ports:
      - "8006:8006"
    environment:
      - BLOG_GENERATOR_PORT=8006
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TRACKER_DB=/app/data/tracker.db
    depends_on:
      - inference_gateway
    volumes:
      - ../services/blog_generator/volumes/data:/app/data
    networks:
      - substrate-net

  event_bus:
    build: ../services/event_bus
    ports:
      - "8003:8003"
    environment:
      - EVENT_BUS_PORT=8003
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ../services/event_bus/config:/app/config:ro
    networks:
      - substrate-net

  # ─── Infrastructure ────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - substrate-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_gateway
    networks:
      - substrate-net

networks:
  substrate-net:
    driver: bridge
  deepsearch_net:
    external: true

volumes:
  redis-data:
