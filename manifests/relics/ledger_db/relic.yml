# Ledger DB Relic — Stripe Events & Financials
name: ledger_db
version: "1.0"
description: "Postgres-backed store for Stripe events, invoices, and revenue data"
type: postgres
storage:
  host: ${POSTGRES_HOST:-localhost}
  port: 5432
  database: substrate
  user: ${POSTGRES_USER:-substrate}
tables:
  stripe_events: "Raw Stripe webhook events"
  invoices: "Processed invoice records"
  revenue_daily: "Daily revenue aggregations"
  subscriptions: "Active subscription state"
operations:
  - query
  - insert
  - update
