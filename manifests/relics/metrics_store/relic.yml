# Metrics Store Relic — Uptime & Latency Time-Series
name: metrics_store
version: "1.0"
description: "SQLite/Redis time-series store for uptime checks, latency data, and alert history"
type: timeseries
storage:
  primary: sqlite
  path: /data/metrics.db
  cache: redis
  redis_url: ${REDIS_URL:-redis://localhost:6379/0}
series:
  uptime: "Service up/down status (boolean)"
  latency: "Response time in milliseconds"
  alert_count: "Alert trigger count per service"
  error_rate: "Percentage of failed checks"
retention_days: 90
operations:
  - write
  - query_range
  - aggregate
