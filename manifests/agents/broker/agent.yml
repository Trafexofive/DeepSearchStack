# Broker Agent — Finance & Webhooks
name: broker
version: "1.0"
description: >
  Processes Stripe webhooks, manages financial records in the
  ledger_db relic, and emits revenue events on the event_bus.

system_prompt: system-prompts/broker.md

tools:
  - stripe_client: tools/stripe_client/tool.yml

relics:
  - ledger_db: manifests/relics/ledger_db/relic.yml
