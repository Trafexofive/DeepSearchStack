# Scribe Agent — Content Generation (Astro+MDX)
name: scribe
version: "1.0"
description: >
  Generates GEO-optimized MDX content for Astro-based blogs.
  Uses web research, outline generation, MDX writing, quality audit,
  and publication to the content vault.

system_prompt: system-prompts/scribe.md

tools:
  - mdx_writer: tools/mdx_writer/tool.yml

llm:
  provider: ${LLM_PROVIDER:-ollama}
  model: ${LLM_MODEL:-llama3.2:latest}
  temperature: 0.7
  max_tokens: 4096

relics:
  - content_vault: manifests/relics/content_vault/relic.yml

tasks:
  research_topic:
    description: "Search the web for information on the given topic"
    tools: [web_search]
    output: research_notes

  generate_outline:
    description: "Generate a structured outline from research notes"
    tools: [mdx_writer]
    output: outline

  write_mdx:
    description: "Write full MDX content from outline"
    tools: [mdx_writer]
    output: mdx_content

  audit_quality:
    description: "Audit content for quality, GEO optimization, and readability"
    tools: [mdx_writer]
    output: audit_report

  publish_to_vault:
    description: "Publish MDX content to the content vault relic"
    relics: [content_vault]
    output: publish_result
