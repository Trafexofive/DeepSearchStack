# MDX Writer Tool
name: mdx_writer
version: "1.0"
description: "Generates, audits, and publishes Astro-compatible MDX content"
type: script
script: scripts/writer.py
inputs:
  action:
    type: string
    enum: [generate_outline, write_mdx, audit_quality, publish]
    required: true
  topic:
    type: string
    required: false
  outline:
    type: object
    required: false
  content:
    type: string
    required: false
output:
  type: object
  description: "MDX content, audit report, or publish receipt"
