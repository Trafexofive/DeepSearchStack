# Weekly Recon Sweep — Competitive intelligence gathering
# Triggered by: scheduled cron or POST /api/workflows/trigger
# Payload: { "workflow": "weekly_recon_sweep", "params": { "targets": ["competitor1.com", ...] } }

name: weekly_recon_sweep
version: "1.0"
description: >
  Scheduled competitive intelligence sweep. Crawls configured competitor targets,
  extracts structured entities (products, features, tech stack), diffs against
  stored state, and persists results to the recon_graph (Neo4j).

trigger:
  type: schedule
  cron: "0 6 * * 1"  # Every Monday at 06:00
  params:
    targets:
      type: array
      required: false
      description: "List of competitor URLs to scan"
      default: []
    delta_only:
      type: boolean
      default: true
      description: "Only process pages that changed since last sweep"

steps:
  - id: load_targets
    agent: recon
    task: load_target_list
    inputs:
      override: $params.targets
    description: "Load competitor URLs from config or override"
    output: targets
    tools: []

  - id: crawl_pages
    agent: recon
    task: crawl
    inputs:
      targets: $steps.load_targets.output
      delta: $params.delta_only
    description: "Scrape each competitor site — extract text, structure, metadata"
    output: raw_pages
    retry: 2

  - id: extract_entities
    agent: recon
    task: extract
    inputs:
      pages: $steps.crawl_pages.output
    description: "Parse scraped content into entities: products, features, pricing, tech"
    output: entities
    depends_on: [crawl_pages]

  - id: diff_state
    agent: recon
    task: diff
    inputs:
      entities: $steps.extract_entities.output
    description: "Compare against previous sweep — detect changes, additions, removals"
    output: diff_report
    depends_on: [extract_entities]

  - id: store_results
    agent: recon
    task: store
    inputs:
      report: $steps.diff_report.output
    description: "Upsert entities into recon_graph (Neo4j) and store sweep report"
    relics:
      - manifests/relics/recon_graph
    output: store_result
    depends_on: [diff_state]

on_success:
  action: notify
  channel: event_bus
  message: "Recon sweep complete — $steps.diff_report.output"

on_failure:
  action: notify
  channel: event_bus
  message: "Recon sweep failed at step $last_step"
  retry_workflow: true
  max_retries: 1
